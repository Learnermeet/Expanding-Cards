<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holiday Expanding Cards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Explore Holiday Destinations</h1>
    <p class="subtitle">Click a card to expand and explore</p>
    
    <div class="cards-wrapper">
      <div class="card sactive" data-card="0">
        <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1533105079780-92b9be482077?w=1200&q=80');"></div>
        <h3 class="card-title">Santorini, Greece</h3>
      </div>
      <div class="card" data-card="1">
        <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1573843981267-be1999ff37cd?w=1200&q=80');"></div>
        <h3 class="card-title">Maldives</h3>
      </div>
      <div class="card" data-card="2">
        <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&q=80');"></div>
        <h3 class="card-title">Swiss Alps</h3>
      </div>
      <div class="card" data-card="3">
        <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1537996194471-e657df975ab4?w=1200&q=80');"></div>
        <h3 class="card-title">Bali, Indonesia</h3>
      </div>
      <div class="card" data-card="4">
        <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1552832230-c0197dd311b5?w=1200&q=80');"></div>
        <h3 class="card-title">Amalfi Coast, Italy</h3>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
